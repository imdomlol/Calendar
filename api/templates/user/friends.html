{% extends "base.html" %}

{% block content %}
<div class="hero">
  <h1>Manage Friends</h1>
  <p class="muted">Add and remove friends.</p>
</div>
<div class="grid">
  <div class="card">
    <h4>Friends List</h4>
    <ul>
      {% for name in friends %}
        <li>{{ name }}</li>
      {% endfor %}
    </ul>
  </div>
  <div class="card">
    <h4>Actions</h4>
    <p>Add Friend</p>
    <p>Remove Friend</p>
  </div>
</div>
{% endblock %}
