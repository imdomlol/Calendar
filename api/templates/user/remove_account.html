{% extends "base.html" %}

{% block content %}
<div class="hero">
  <h1>Remove Account</h1>
  <p class="muted">This will permanently delete your account.</p>
</div>
<div class="card">
  <h4>Danger Zone</h4>
  <p>This action would permanently remove your account and cannot be undone.</p>
  <button onclick="removeAccount()" class="btn danger" style="border:none; cursor:pointer;">Confirm removal</button>
</div>

<script>
function removeAccount() {
    if (!confirm('Are you sure? This cannot be undone.')) return;
    fetch('/ui/user/me', { method: 'DELETE' }).then(function(r) {
        if (r.ok) {
            window.location.href = '/ui/logout';
        } else {
            alert('Could not remove account.');
        }
    });
}
</script>

{% endblock %}
