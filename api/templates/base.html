<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <link rel="stylesheet" href="{{ url_for('ui.static', filename='styles.css') }}" />
</head>
<body>
  <div class="topbar">
    <div class="brand"><a href="{{ url_for('ui.brand_home') }}">Calendar System</a></div>
    <div class="topbar-right">
      <a class="settings-btn" href="{{ url_for('ui.settings_page') }}" aria-label="Settings">&#9881;</a>
      <div class="top-links">
        {% if ui_user %}
        <a href="{{ url_for('ui.logout') }}">Log Out</a>
        {% else %}
        <a href="{{ url_for('ui.login', next=request.path) }}">Log In</a>
        <a href="{{ url_for('ui.register', next=request.path) }}">Register</a>
        {% endif %}
      </div>
    </div>
  </div>

  <div class="layout" id="layout">
    <aside class="sidebar" id="sidebar">
      <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">&#9776;</button>
      <div class="sidebar-nav">
      {% for item in features_nav %}
        <a href="{{ item.href }}">{{ item.label }}</a>
      {% endfor %}
      </div>
    </aside>

    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>

  {% if build_info %}
  <footer class="build-footer">
    Build:
    <code>{{ build_info.sha }}</code>
    {% if build_info.date %}&nbsp;&middot;&nbsp;{{ build_info.date }}{% endif %}
  </footer>
  {% endif %}

  <script>
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const layout = document.getElementById('layout');
      const collapsed = sidebar.classList.toggle('sidebar--collapsed');
      layout.classList.toggle('layout--sidebar-collapsed', collapsed);
      try { localStorage.setItem('sidebarCollapsed', collapsed ? '1' : '0'); } catch(e) {}
    }
    (function() {
      try {
        if (localStorage.getItem('sidebarCollapsed') === '1') {
          const sidebar = document.getElementById('sidebar');
          const layout = document.getElementById('layout');
          if (sidebar) sidebar.classList.add('sidebar--collapsed');
          if (layout) layout.classList.add('layout--sidebar-collapsed');
        }
      } catch(e) {}
    })();
  </script>
</body>
</html>
