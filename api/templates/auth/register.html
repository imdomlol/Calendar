{% extends "base.html" %}

{% block content %}
<div class="hero">
  <h1>Register</h1>
  <p class="muted">Create an account to access calendar management.</p>
</div>
<div class="card">
  {% if error %}
    <p style="color:#b91c1c; margin:0 0 12px 0;">{{ error }}</p>
  {% endif %}
  <form method="POST" action="/ui/register?next={{ next_path | urlencode }}"
        style="display:flex; flex-direction:column; gap:10px; max-width:420px;">
    <input type="text" name="name" placeholder="Name (optional)"
           style="padding:10px; border:1px solid #cbd5e1; border-radius:10px;" />
    <input type="email" name="email" placeholder="Email" required
           style="padding:10px; border:1px solid #cbd5e1; border-radius:10px;" />
    <input type="password" name="password" placeholder="Password" required
           style="padding:10px; border:1px solid #cbd5e1; border-radius:10px;" />
    <input type="password" name="confirm_password" placeholder="Confirm password" required
           style="padding:10px; border:1px solid #cbd5e1; border-radius:10px;" />
    <button type="submit" class="btn"
            style="border:none; cursor:pointer; width:max-content; margin-top:0;">Create Account</button>
  </form>
  <p class="muted" style="margin-top:12px;">
    Already have an account? <a href="/ui/login?next={{ next_path | urlencode }}">Log in</a>
  </p>
</div>
{% endblock %}
