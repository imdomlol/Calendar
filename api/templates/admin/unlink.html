{% extends "base.html" %}

{% block content %}
<div class="hero">
  <h1>Unlink External Calendars</h1>
  <p class="muted">Admin action for external calendar disconnection.</p>
</div>
<div class="card">
  <h4>Linked providers</h4>
  <ul>
    {% for name in providers %}
      <li>{{ name }}</li>
    {% endfor %}
  </ul>
  <a class="btn danger" href="{{ url_for('ui.dashboard', role='admin') }}">Unlink All</a>
</div>
{% endblock %}
