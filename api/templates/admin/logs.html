{% extends "base.html" %}

{% block content %}
<div class="hero">
  <h1>System Logs</h1>
  <p class="muted">Admin-only activity log view.</p>
</div>
<table>
  <tr><th>#</th><th>Log Entry</th></tr>
  {% for line in logs %}
    <tr><td>{{ loop.index }}</td><td>{{ line }}</td></tr>
  {% endfor %}
</table>
{% endblock %}
