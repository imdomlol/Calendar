{% extends "base.html" %}

{% block content %}
<div class="hero">
  <h1>System-Wide Notifications</h1>
  <p class="muted">Post a message across the site.</p>
</div>
<div class="card">
  <h4>Active Notification</h4>
  {% if active_message %}
  <p>{{ active_message }}</p>
  <form method="post" action="{{ url_for('ui.clear_notification') }}">
    <button class="btn danger" type="submit">Clear</button>
  </form>
  {% else %}
  <p class="muted">No active notification.</p>
  {% endif %}
</div>

<div class="card">
  <h4>New Notification</h4>
  <form method="post" action="{{ url_for('ui.send_notification') }}">
    <textarea name="message" rows="5" required></textarea>
    <button class="btn warning" type="submit">Send Notification</button>
  </form>
</div>
{% endblock %}
