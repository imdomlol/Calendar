{% extends "base.html" %}

{% block content %}
<div class="hero">
  <h1>View Events</h1>
  <p class="muted">Guest event list.</p>
</div>
{% if events %}
  <table>
    <tr><th>Title</th><th>Date</th><th>Time</th></tr>
    {% for event in events %}
      <tr><td>{{ event.title }}</td><td>{{ event.date }}</td><td>{{ event.time }}</td></tr>
    {% endfor %}
  </table>
{% else %}
  <div class="empty">
    <h3>No events found</h3>
    <p>Nothing to display right now.</p>
  </div>
{% endif %}
{% endblock %}
